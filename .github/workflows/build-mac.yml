name: Build Mac

on:
  workflow_dispatch:

jobs:
  build-mac:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm install

      - run: npx electron-builder --mac --publish never

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mac-build
          path: dist/
